name: External Integration Canaries

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * 0"
  push:
    branches: [main]
    paths:
      - "scripts/external-canary.mjs"
      - "scripts/record-readiness-evidence.mjs"
      - ".github/workflows/external-integrations.yml"
      - "lib/integrations/**"
      - "app/api/finance/zatca/sandbox/**"
  pull_request:
    paths:
      - "scripts/external-canary.mjs"
      - ".github/workflows/external-integrations.yml"
      - "lib/integrations/**"
      - "app/api/finance/zatca/sandbox/**"

permissions:
  contents: read

jobs:
  external-canaries:
    name: Google Workspace and ZATCA sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      GOOGLE_GMAIL_SENDER: ${{ secrets.GOOGLE_GMAIL_SENDER }}
      GOOGLE_CANARY_EMAIL: ${{ secrets.GOOGLE_CANARY_EMAIL }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
      ZATCA_SANDBOX_ENABLED: ${{ secrets.ZATCA_SANDBOX_ENABLED }}
      ZATCA_SANDBOX_URL: ${{ secrets.ZATCA_SANDBOX_URL }}
      ZATCA_SANDBOX_TOKEN: ${{ secrets.ZATCA_SANDBOX_TOKEN }}
      COMPANY_LEGAL_NAME: ${{ secrets.COMPANY_LEGAL_NAME }}
      COMPANY_VAT_NUMBER: ${{ secrets.COMPANY_VAT_NUMBER }}
      PRODUCTION_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
      PRODUCTION_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PRODUCTION_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Verify external test credentials exist
        id: credentials
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_REFRESH_TOKEN GOOGLE_GMAIL_SENDER; do
            if [ -z "${!name:-}" ]; then
              echo "Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.event_name }}" = "push" ]; then
              echo "ready=false" >> "$GITHUB_OUTPUT"
              echo "::notice::External canaries skipped for this code gate because isolated test credentials are not configured. LIVE capability evidence remains unavailable."
              exit 0
            fi
            echo "Scheduled and manual external canaries require isolated test credentials in GitHub Actions secrets."
            exit 2
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Run real external canaries
        if: steps.credentials.outputs.ready == 'true'
        run: node scripts/external-canary.mjs

      - name: Record verified Google capability evidence
        if: steps.credentials.outputs.ready == 'true' && github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          for key in google.drive.file google.gmail.draft google.sheets.row google.calendar.event; do
            npm run readiness:evidence -- \
              --key "capability:$key" \
              --environment production \
              --status PASS \
              --expires-hours 720 \
              --details "{\"canary\":\"$key\",\"cleanupRequired\":true,\"report\":\"external-canary-report.json\"}" \
              --optional
          done

      - name: Upload external evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-canary-report
          path: external-canary-report.json
          if-no-files-found: ignore
          retention-days: 90
