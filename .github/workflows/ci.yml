name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, tests, build, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: ESLint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee eslint-output.log

      - name: TypeScript
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typescript-output.log

      - name: Unit and integration tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee vitest-output.log

      - name: Upload quality diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-diagnostics
          path: |
            typescript-output.log
            vitest-output.log
            eslint-output.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Production build
        run: npm run build

      - name: Production security smoke
        run: npm run test:smoke

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
